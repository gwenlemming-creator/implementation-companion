<div class="app-shell">
  <nav class="left-nav">
    <div class="left-nav__item left-nav__item--active">
      <i class="fa-light fa-list-check"></i> Implementation Plans
    </div>
    <div class="left-nav__item">
      <i class="fa-light fa-building"></i> Clients
    </div>
    <div class="left-nav__item">
      <i class="fa-light fa-gear"></i> Settings
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Implementation Plans</h1>
        <p class="page-subtitle">Manage client onboarding plans</p>
      </div>
    </div>

    <div class="toolbar">
      <input class="search-input" type="text" placeholder="Search plans..."
             [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)">
      <button class="btn btn-primary" (click)="showCreateDrawer.set(true)">
        <i class="fa-light fa-plus"></i> Create Plan
      </button>
    </div>

    <div class="plan-grid">
      @for (plan of filteredPlans(); track plan.id) {
        <app-plan-card [plan]="plan" />
      } @empty {
        <p class="empty-state">No plans yet. Create your first plan to get started.</p>
      }
    </div>
  </main>
</div>

@if (showCreateDrawer()) {
  <app-create-plan-drawer
    (planCreated)="onPlanCreated($event)"
    (closed)="showCreateDrawer.set(false)" />
}
